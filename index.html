<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBot 10 - Genetic Sector Transfer & TradeStation Fees</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .control-panel {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.15);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #00d4ff;
        }
        .stat-card h3 {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 5px;
        }
        .stat-card .value {
            font-size: 1.8em;
            font-weight: bold;
            color: #00d4ff;
        }
        .bot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .bot-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            border: 2px solid transparent;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .bot-card:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.15);
        }
        .bot-card.target-achieved {
            border-color: #00ff88;
            background: rgba(0,255,136,0.1);
        }
        .bot-card.sector-transferred {
            border-color: #ff6b6b;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,107,0.4); }
            50% { box-shadow: 0 0 20px 5px rgba(255,107,107,0); }
        }
        .bot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .bot-id {
            font-weight: bold;
            font-size: 1.2em;
        }
        .sector-badge {
            background: #ff6b6b;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .sector-TECH { background: #00d4ff; color: #000; }
        .sector-FINANCE { background: #ffd700; color: #000; }
        .sector-HEALTH { background: #ff6b6b; color: #fff; }
        .sector-ENERGY { background: #4ecdc4; color: #000; }
        .sector-CONSUMER { background: #95e1d3; color: #000; }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .progress-fill.low {
            background: linear-gradient(90deg, #ff6b6b, #ffa500);
        }
        .bot-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 0.9em;
            margin-top: 10px;
        }
        .info-item {
            display: flex;
            flex-direction: column;
        }
        .info-label {
            opacity: 0.7;
            font-size: 0.8em;
        }
        .info-value {
            font-weight: bold;
        }
        .log-container {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
        }
        .log-entry {
            margin-bottom: 5px;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .log-entry.success { color: #00ff88; }
        .log-entry.warning { color: #ffa500; }
        .log-entry.error { color: #ff6b6b; }
        .log-entry.genetic { color: #ff00ff; font-weight: bold; }
        .btn {
            background: #00d4ff;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 10px;
            transition: all 0.3s;
        }
        .btn:hover { background: #00ff88; transform: scale(1.05); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .fee-info {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 0.85em;
        }
        .highlight { color: #00ff88; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AutoBot 10 - 유전 알고리즘 & TradeStation 수수료</h1>

        <div class="control-panel">
            <div style="margin-bottom: 15px;">
                <button class="btn" id="startBtn" onclick="simulation.start()">▶ 시뮬레이션 시작</button>
                <button class="btn" id="stopBtn" onclick="simulation.stop()" disabled>⏸ 중지</button>
                <button class="btn" onclick="simulation.reset()">🔄 리셋</button>
                <button class="btn" onclick="simulation.forceTransfer()">🧬 강제 섹터 전수</button>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>생존 봇 수</h3>
                    <div class="value" id="aliveCount">10</div>
                </div>
                <div class="stat-card">
                    <h3>목표 달성 봇</h3>
                    <div class="value" id="achievedCount">0</div>
                </div>
                <div class="stat-card">
                    <h3>총 수수료 (누적)</h3>
                    <div class="value" id="totalFees">$0.00</div>
                </div>
                <div class="stat-card">
                    <h3>마지막 섹터 전수</h3>
                    <div class="value" id="lastTransfer">없음</div>
                </div>
            </div>
            <div class="fee-info">
                <strong>📊 TradeStation 수수료 구조:</strong>
                주식 매도 시 SEC Fee($8/$1M) + FINRA TAF($0.000145/주, max $7.27) |
                옵션 $0.50/계약 |
                슬리피지 0.02% 적용
            </div>
        </div>

        <div class="bot-grid" id="botGrid"></div>

        <div style="margin-top: 20px;">
            <h3 style="margin-bottom: 10px;">📋 거래 로그</h3>
            <div class="log-container" id="logContainer"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // TradeStation 수수료 계산기
        // ==========================================
        class TradeStationFees {
            static STOCK = {
                commission: 0, // $0 온라인 거래
                secFeeRate: 8 / 1000000, // $8 per $1,000,000 (매도 시만)
                finraTafPerShare: 0.000145, // per share (매도 시만)
                maxFinraTaf: 7.27,
                minFinraTaf: 0.01
            };

            static OPTION = {
                commissionPerContract: 0.50,
                finraTafPerContract: 0.002, // 계약당 $0.002
                maxFinraTaf: 5.50
            };

            static calculateStockSellFees(shares, price) {
                const proceeds = shares * price;

                // SEC Fee (Federal Transaction Fee) - 매도 시만
                const secFee = proceeds * this.STOCK.secFeeRate;

                // FINRA Trading Activity Fee - 매도 시만
                let finraTaf = shares * this.STOCK.finraTafPerShare;
                finraTaf = Math.max(this.STOCK.minFinraTaf,
                                   Math.min(finraTaf, this.STOCK.maxFinraTaf));

                // 슬리피지 (시장가 주문 가정, 0.02%)
                const slippage = proceeds * 0.0002;

                return {
                    commission: 0,
                    secFee: secFee,
                    finraTaf: finraTaf,
                    slippage: slippage,
                    total: secFee + finraTaf + slippage
                };
            }

            static calculateBuyFees(shares, price) {
                // 매수 시에는 커미션만 (TradeStation 주식 매수 $0)
                const slippage = (shares * price) * 0.0002; // 슬리피지만 적용
                return {
                    commission: 0,
                    slippage: slippage,
                    total: slippage
                };
            }

            static formatFees(fees) {
                if (fees.secFee !== undefined) {
                    return `SEC: $${fees.secFee.toFixed(2)}, FINRA: $${fees.finraTaf.toFixed(2)}, Slippage:
$${fees.slippage.toFixed(2)}`;
                }
                return `Slippage: $${fees.slippage.toFixed(2)}`;
            }
        }

        // ==========================================
        // 봇 클래스
        // ==========================================
        class Bot {
            constructor(id, sector, initialCapital = 10000, targetAmount = 15000) {
                this.id = id;
                this.sector = sector;
                this.initialCapital = initialCapital;
                this.capital = initialCapital;
                this.targetAmount = targetAmount;
                this.position = 0; // 보유 주식 수
                this.avgPrice = 0; // 평균 매수가
                this.tradeCount = 0;
                this.totalFeesPaid = 0;
                this.achievedTime = null;
                this.returnRate = 0;
                this.sectorTransferCount = 0;
                this.lastTrade = null;
                this.isAlive = true;
            }

            updateReturnRate() {
                const positionValue = this.position * (this.avgPrice || 1); // 간단화
                const totalValue = this.capital + positionValue;
                this.returnRate = (totalValue - this.initialCapital) / this.initialCapital;
            }

            checkTargetAchievement() {
                this.updateReturnRate();
                const totalValue = this.capital + (this.position * (this.avgPrice || 0));
                if (totalValue >= this.targetAmount && !this.achievedTime) {
                    this.achievedTime = new Date();
                    return true;
                }
                return false;
            }

            getTotalValue(currentPrice) {
                return this.capital + (this.position * currentPrice);
            }

            executeBuy(quantity, price) {
                if (quantity <= 0) return null;
                const cost = quantity * price;
                const fees = TradeStationFees.calculateBuyFees(quantity, price);
                const totalCost = cost + fees.total;

                if (totalCost > this.capital) {
                    // 자금 부족 시 가능한 최대 수량 계산
                    const maxQty = Math.floor((this.capital - fees.total) / price);
                    if (maxQty <= 0) return null;
                    return this.executeBuy(maxQty, price);
                }

                this.capital -= totalCost;
                // 평균 매수가 조정
                const totalShares = this.position + quantity;
                this.avgPrice = ((this.position * this.avgPrice) + (quantity * price)) / totalShares;
                this.position += quantity;
                this.tradeCount++;
                this.totalFeesPaid += fees.total;

                this.lastTrade = {
                    type: 'BUY',
                    quantity: quantity,
                    price: price,
                    fees: fees,
                    time: new Date()
                };

                return { type: 'BUY', quantity, price, fees };
            }

            executeSell(quantity, price) {
                if (quantity <= 0 || this.position <= 0) return null;
                const sellQty = Math.min(quantity, this.position);

                const proceeds = sellQty * price;
                const fees = TradeStationFees.calculateStockSellFees(sellQty, price);
                const netProceeds = proceeds - fees.total;

                this.capital += netProceeds;
                this.position -= sellQty;
                this.tradeCount++;
                this.totalFeesPaid += fees.total;

                if (this.position === 0) this.avgPrice = 0;

                this.lastTrade = {
                    type: 'SELL',
                    quantity: sellQty,
                    price: price,
                    fees: fees,
                    time: new Date()
                };

                return { type: 'SELL', quantity: sellQty, price, fees, netProceeds };
            }
        }

        // ==========================================
        // 섹터 유전 관리자
        // ==========================================
        class GeneticSectorManager {
            constructor() {
                this.lastAchievedBot = null;
                this.transferHistory = [];
            }

            recordAchievement(bot) {
                if (bot.achievedTime && (!this.lastAchievedBot ||
                    bot.achievedTime > this.lastAchievedBot.achievedTime)) {
                    this.lastAchievedBot = bot;
                    return true;
                }
                return false;
            }

            findWorstBot(bots) {
                const aliveBots = bots.filter(b => b.isAlive);
                if (aliveBots.length === 0) return null;

                return aliveBots.reduce((worst, current) => {
                    const worstValue = worst.getTotalValue(this.getSectorPrice(worst.sector));
                    const currentValue = current.getTotalValue(this.getSectorPrice(current.sector));
                    return currentValue < worstValue ? current : worst;
                });
            }

            getSectorPrice(sector) {
                // 섹터별 현재 가격 시뮬레이션 (실제로는 시장 데이터에서 가져와야 함)
                const basePrices = { TECH: 150, FINANCE: 80, HEALTH: 120, ENERGY: 60, CONSUMER: 100 };
                return basePrices[sector] || 100;
            }

            transferSector(bots) {
                if (!this.lastAchievedBot) {
                    return { success: false, reason: '전수할 성공 봇이 없습니다' };
                }

                const worstBot = this.findWorstBot(bots);
                if (!worstBot) {
                    return { success: false, reason: '전수 대상 봇이 없습니다' };
                }

                if (worstBot.id === this.lastAchievedBot.id) {
                    return { success: false, reason: '이미 최고의 섹터를 보유 중입니다' };
                }

                const oldSector = worstBot.sector;
                const newSector = this.lastAchievedBot.sector;

                // 섹터 변경
                worstBot.sector = newSector;
                worstBot.sectorTransferCount++;

                const transfer = {
                    from: this.lastAchievedBot.id,
                    to: worstBot.id,
                    sector: newSector,
                    oldSector: oldSector,
                    time: new Date()
                };

                this.transferHistory.push(transfer);

                return {
                    success: true,
                    transfer: transfer,
                    message: `🧬 섹터 전수: Bot ${worstBot.id} [${oldSector}] → [${newSector}] (Bot
${this.lastAchievedBot.id}로부터)`
                };
            }
        }

        // ==========================================
        // 시뮬레이션 엔진
        // ==========================================
        class TradingSimulation {
            constructor() {
                this.bots = [];
                this.sectors = ['TECH', 'FINANCE', 'HEALTH', 'ENERGY', 'CONSUMER'];
                this.geneticManager = new GeneticSectorManager();
                this.running = false;
                this.tick = 0;
                this.totalFeesCollected = 0;
                this.intervalId = null;

                // 섹터별 가격 데이터 (시뮬레이션용)
                this.sectorPrices = {
                    TECH: { price: 150, volatility: 0.03, trend: 0.0002 },
                    FINANCE: { price: 80, volatility: 0.015, trend: 0.0001 },
                    HEALTH: { price: 120, volatility: 0.02, trend: 0.00015 },
                    ENERGY: { price: 60, volatility: 0.025, trend: 0.0001 },
                    CONSUMER: { price: 100, volatility: 0.018, trend: 0.00012 }
                };

                this.initBots();
                this.render();
            }

            initBots() {
                this.bots = [];
                for (let i = 1; i <= 10; i++) {
                    const randomSector = this.sectors[Math.floor(Math.random() * this.sectors.length)];
                    this.bots.push(new Bot(i, randomSector));
                }
                this.totalFeesCollected = 0;
                this.tick = 0;
                this.geneticManager = new GeneticSectorManager();
            }

            reset() {
                this.stop();
                this.initBots();
                this.clearLogs();
                this.updateUI();
                this.render();
                this.log('시뮬레이션이 리셋되었습니다.', 'warning');
            }

            start() {
                if (this.running) return;
                this.running = true;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;

                this.intervalId = setInterval(() => this.step(), 1000); // 1초마다 틱
                this.log('시뮬레이션 시작!', 'success');
            }

            stop() {
                this.running = false;
                if (this.intervalId) {
                    clearInterval(this.intervalId);
                    this.intervalId = null;
                }
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
                this.log('시뮬레이션 중지', 'warning');
            }

            updateSectorPrices() {
                for (let sector in this.sectorPrices) {
                    const data = this.sectorPrices[sector];
                    const change = (Math.random() - 0.5) * data.volatility + data.trend;
                    data.price *= (1 + change);
                    data.price = Math.max(data.price, 10); // 최소가격 보장
                }
            }

            getPriceForSector(sector) {
                return this.sectorPrices[sector]?.price || 100;
            }

            step() {
                this.tick++;
                this.updateSectorPrices();

                // 각 봇 거래 로직 (간단한 랜덤 전략)
                this.bots.forEach(bot => {
                    if (!bot.isAlive) return;

                    const currentPrice = this.getPriceForSector(bot.sector);
                    const totalValue = bot.getTotalValue(currentPrice);

                    // 간단한 전략: 30% 확률로 매도, 30% 확률로 매수
                    const action = Math.random();

                    if (action < 0.3 && bot.position > 0) {
                        // 매도
                        const sellQty = Math.ceil(bot.position * 0.5); // 50% 매도
                        const result = bot.executeSell(sellQty, currentPrice);
                        if (result) {
                            this.totalFeesCollected += result.fees.total;
                            if (this.tick % 5 === 0) { // 로그는 간헐적으로
                                this.log(`Bot ${bot.id} 매도 ${result.quantity}주 @ $${currentPrice.toFixed(2)} (수
수료: $${result.fees.total.toFixed(2)})`);
                            }
                        }
                    } else if (action > 0.7 && bot.capital > currentPrice) {
                        // 매수
                        const buyQty = Math.floor((bot.capital * 0.3) / currentPrice); // 자본의 30% 매수
                        if (buyQty > 0) {
                            const result = bot.executeBuy(buyQty, currentPrice);
                            if (result) {
                                this.totalFeesCollected += result.fees.total;
                                if (this.tick % 5 === 0) {
                                    this.log(`Bot ${bot.id} 매수 ${result.quantity}주 @
$${currentPrice.toFixed(2)}`);
                                }
                            }
                        }
                    }

                    // 목표 달성 체크
                    if (bot.checkTargetAchievement()) {
                        this.geneticManager.recordAchievement(bot);
                        this.log(`🎯 Bot ${bot.id} 목표금액 달성! (${bot.sector} 섹터) 수익률: ${(bot.returnRate *
100).toFixed(1)}%`, 'success');
                    }

                    // 청산 체크 (자본금 20% 이하로 떨어지면 사망)
                    if (totalValue < bot.initialCapital * 0.2) {
                        bot.isAlive = false;
                        this.log(`💀 Bot ${bot.id} 청산되었습니다.`, 'error');
                    }
                });

                // 10틱마다 자동 섹터 전수 체크
                if (this.tick % 10 === 0) {
                    this.autoTransfer();
                }

                this.updateUI();
                this.render();
            }

            autoTransfer() {
                const result = this.geneticManager.transferSector(this.bots);
                if (result.success) {
                    this.log(result.message, 'genetic');
                    this.updateTransferUI();
                }
            }

            forceTransfer() {
                const result = this.geneticManager.transferSector(this.bots);
                if (result.success) {
                    this.log(result.message, 'genetic');
                    this.updateTransferUI();
                    this.render();
                } else {
                    this.log(`섹터 전수 실패: ${result.reason}`, 'warning');
                }
            }

            updateTransferUI() {
                const lastTransfer =
this.geneticManager.transferHistory[this.geneticManager.transferHistory.length - 1];
                if (lastTransfer) {
                    document.getElementById('lastTransfer').textContent =
                        `Bot ${lastTransfer.to} ← ${lastTransfer.sector}
(${lastTransfer.time.toLocaleTimeString()})`;
                }
            }

            updateUI() {
                // 통계 업데이트
                const aliveCount = this.bots.filter(b => b.isAlive).length;
                const achievedCount = this.bots.filter(b => b.achievedTime !== null).length;

                document.getElementById('aliveCount').textContent = aliveCount;
                document.getElementById('achievedCount').textContent = achievedCount;
                document.getElementById('totalFees').textContent = `$${this.totalFeesCollected.toFixed(2)}`;
            }

            render() {
                const grid = document.getElementById('botGrid');
                grid.innerHTML = '';

                // 수익률 순으로 정렬
                const sortedBots = [...this.bots].sort((a, b) => {
                    const valA = a.getTotalValue(this.getPriceForSector(a.sector));
                    const valB = b.getTotalValue(this.getPriceForSector(b.sector));
                    return valB - valA;
                });

                sortedBots.forEach((bot, index) => {
                    const currentPrice = this.getPriceForSector(bot.sector);
                    const totalValue = bot.getTotalValue(currentPrice);
                    const progress = Math.min((totalValue / bot.targetAmount) * 100, 100);
                    const isTargetAchieved = bot.achievedTime !== null;
                    const isTransferred = bot.sectorTransferCount > 0;

                    const card = document.createElement('div');
                    card.className = `bot-card ${isTargetAchieved ? 'target-achieved' : ''} ${isTransferred ?
'sector-transferred' : ''}`;

                    card.innerHTML = `
                        <div class="bot-header">
                            <span class="bot-id">Bot #${bot.id} ${index === 0 ? '👑' : ''}</span>
                            <span class="sector-badge sector-${bot.sector}">${bot.sector}</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill ${progress < 50 ? 'low' : ''}" style="width: ${progress}%">
                                ${progress.toFixed(0)}%
                            </div>
                        </div>
                        <div class="bot-info">
                            <div class="info-item">
                                <span class="info-label">현재 가치</span>
                                <span class="info-value">$${totalValue.toFixed(2)}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">목표금액</span>
                                <span class="info-value">$${bot.targetAmount}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">보유 주식</span>
                                <span class="info-value">${bot.position}주</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">현금</span>
                                <span class="info-value">$${bot.capital.toFixed(2)}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">누적 수수료</span>
                                <span class="info-value" style="color:
#ff6b6b">$${bot.totalFeesPaid.toFixed(2)}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">섹터 변경</span>
                                <span class="info-value">${bot.sectorTransferCount}회</span>
                            </div>
                        </div>
                        ${isTargetAchieved ? '<div style="margin-top: 10px; color: #00ff88; font-weight: bold;">✅
목표 달성!</div>' : ''}
                    `;

                    grid.appendChild(card);
                });
            }

            log(message, type = '') {
                const container = document.getElementById('logContainer');
                const entry = document.createElement('div');
                entry.className = `log-entry ${type}`;
                const time = new Date().toLocaleTimeString();
                entry.textContent = `[${time}] ${message}`;
                container.insertBefore(entry, container.firstChild);

                // 로그가 너무 많아지면 오래된 것 삭제
                while (container.children.length > 100) {
                    container.removeChild(container.lastChild);
                }
            }

            clearLogs() {
                document.getElementById('logContainer').innerHTML = '';
            }
        }

        // 전역 인스턴스
        const simulation = new TradingSimulation();
    </script>
</body>
</html>
