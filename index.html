<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBot 10 - Genetic Sector Transfer & TradeStation Fees</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .control-panel {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.15);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #00d4ff;
        }
        .stat-card h3 {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 5px;
        }
        .stat-card .value {
            font-size: 1.8em;
            font-weight: bold;
            color: #00d4ff;
        }
        .bot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .bot-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            border: 2px solid transparent;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .bot-card:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.15);
        }
        .bot-card.target-achieved {
            border-color: #00ff88;
            background: rgba(0,255,136,0.1);
        }
        .bot-card.sector-transferred {
            border-color: #ff6b6b;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,107,0.4); }
            50% { box-shadow: 0 0 20px 5px rgba(255,107,107,0); }
        }
        .bot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .bot-id {
            font-weight: bold;
            font-size: 1.2em;
        }
        .sector-badge {
            background: #ff6b6b;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .sector-TECH { background: #00d4ff; color: #000; }
        .sector-FINANCE { background: #ffd700; color: #000; }
        .sector-HEALTH { background: #ff6b6b; color: #fff; }
        .sector-ENERGY { background: #4ecdc4; color: #000; }
        .sector-CONSUMER { background: #95e1d3; color: #000; }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .progress-fill.low {
            background: linear-gradient(90deg, #ff6b6b, #ffa500);
        }
        .bot-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 0.9em;
            margin-top: 10px;
        }
        .info-item {
            display: flex;
            flex-direction: column;
        }
        .info-label {
            opacity: 0.7;
            font-size: 0.8em;
        }
        .info-value {
            font-weight: bold;
        }
        .log-container {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
        }
        .log-entry {
            margin-bottom: 5px;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .log-entry.success { color: #00ff88; }
        .log-entry.warning { color: #ffa500; }
        .log-entry.error { color: #ff6b6b; }
        .log-entry.genetic { color: #ff00ff; font-weight: bold; }
        .btn {
            background: #00d4ff;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 10px;
            transition: all 0.3s;
        }
        .btn:hover { background: #00ff88; transform: scale(1.05); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .fee-info {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 0.85em;
        }
        .highlight { color: #00ff88; font-weight: bold; }
        .dead { opacity: 0.4; filter: grayscale(100%); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AutoBot 10 - 유전 알고리즘 & TradeStation 수수료</h1>

        <div class="control-panel">
            <div style="margin-bottom: 15px;">
                <button class="btn" id="startBtn" onclick="simulation.start()">▶ 시뮬레이션 시작</button>
                <button class="btn" id="stopBtn" onclick="simulation.stop()" disabled>⏸ 중지</button>
                <button class="btn" onclick="simulation.reset()">🔄 리셋</button>
                <button class="btn" onclick="simulation.forceTransfer()">🧬 강제 섹터 전수</button>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>생존 봇 수</h3>
                    <div class="value" id="aliveCount">10</div>
                </div>
                <div class="stat-card">
                    <h3>목표 달성 봇</h3>
                    <div class="value" id="achievedCount">0</div>
                </div>
                <div class="stat-card">
                    <h3>총 수수료 (누적)</h3>
                    <div class="value" id="totalFees">$0.00</div>
                </div>
                <div class="stat-card">
                    <h3>마지막 섹터 전수</h3>
                    <div class="value" id="lastTransfer">없음</div>
                </div>
            </div>
            <div class="fee-info">
                <strong>📊 TradeStation 수수료 구조:</strong>
                주식 매도 시 SEC Fee($8/$1M) + FINRA TAF($0.000145/주, max $7.27) |
                슬리피지 0.02% 적용
            </div>
        </div>

        <div class="bot-grid" id="botGrid"></div>

        <div style="margin-top: 20px;">
            <h3 style="margin-bottom: 10px;">📋 거래 로그</h3>
            <div class="log-container" id="logContainer"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // TradeStation 수수료 계산기
        // ==========================================
        class TradeStationFees {
            static STOCK = {
                commission: 0,
                secFeeRate: 8 / 1000000,
                finraTafPerShare: 0.000145,
                maxFinraTaf: 7.27,
                minFinraTaf: 0.01
            };

            static calculateStockSellFees(shares, price) {
                const proceeds = shares * price;

                // SEC Fee (매도 시만)
                const secFee = proceeds * this.STOCK.secFeeRate;

                // FINRA TAF (매도 시만)
                let finraTaf = shares * this.STOCK.finraTafPerShare;
                finraTaf = Math.max(this.STOCK.minFinraTaf,
                                   Math.min(finraTaf, this.STOCK.maxFinraTaf));

                // 슬리피지 0.02%
                const slippage = proceeds * 0.0002;

                return {
                    commission: 0,
                    secFee: secFee,
                    finraTaf: finraTaf,
                    slippage: slippage,
                    total: secFee + finraTaf + slippage
                };
            }

            static calculateBuyFees(shares, price) {
                const slippage = (shares * price) * 0.0002;
                return {
                    commission: 0,
                    slippage: slippage,
                    total: slippage
                };
            }
        }

        // ==========================================
        // 봇 클래스
        // ==========================================
        class Bot {
            constructor(id, sector, initialCapital = 10000, targetAmount = 15000) {
                this.id = id;
                this.sector = sector;
                this.initialCapital = initialCapital;
                this.capital = initialCapital;
                this.targetAmount = targetAmount;
                this.position = 0;
                this.avgPrice = 0;
                this.tradeCount = 0;
                this.totalFeesPaid = 0;
                this.achievedTime = null;
                this.returnRate = 0;
                this.sectorTransferCount = 0;
                this.lastTrade = null;
                this.isAlive = true;
            }

            getTotalValue(currentPrice) {
                return this.capital + (this.position * currentPrice);
            }

            checkTargetAchievement(currentPrice) {
                const totalValue = this.getTotalValue(currentPrice);
                this.returnRate = (totalValue - this.initialCapital) / this.initialCapital;

                if (totalValue >= this.targetAmount && !this.achievedTime) {
                    this.achievedTime = new Date();
                    return true;
                }
                return false;
            }

            executeBuy(quantity, price) {
                if (quantity <= 0 || !this.isAlive) return null;

                const cost = quantity * price;
                const fees = TradeStationFees.calculateBuyFees(quantity, price);
                const totalCost = cost + fees.total;

                if (totalCost > this.capital) {
                    const maxQty = Math.floor((this.capital - fees.total) / price);
                    if (maxQty <= 0) return null;
                    return this.executeBuy(maxQty, price);
                }

                this.capital -= totalCost;

                // 평균 단가 계산 (0으로 나누기 방지)
                if (this.position === 0) {
                    this.avgPrice = price;
                } else {
                    const totalCostBasis = (this.position * this.avgPrice) + (quantity * price);
                    this.avgPrice = totalCostBasis / (this.position + quantity);
                }

                this.position += quantity;
                this.tradeCount++;
                this.totalFeesPaid += fees.total;

                this.lastTrade = {
                    type: 'BUY',
                    quantity: quantity,
                    price: price,
                    fees: fees,
                    time: new Date()
                };

                return { type: 'BUY', quantity, price, fees, totalCost };
            }

            executeSell(quantity, price) {
                if (quantity <= 0 || this.position <= 0 || !this.isAlive) return null;

                const sellQty = Math.min(quantity, this.position);
                const proceeds = sellQty * price;
                const fees = TradeStationFees.calculateStockSellFees(sellQty, price);
                const netProceeds = proceeds - fees.total;

                this.capital += netProceeds;
                this.position -= sellQty;
                this.tradeCount++;
                this.totalFeesPaid += fees.total;

                if (this.position === 0) this.avgPrice = 0;

                this.lastTrade = {
                    type: 'SELL',
                    quantity: sellQty,
                    price: price,
                    fees: fees,
                    netProceeds: netProceeds,
                    time: new Date()
                };

                return { type: 'SELL', quantity: sellQty, price, fees, netProceeds, proceeds };
            }
        }

        // ==========================================
        // 시뮬레이션 엔진
        // ==========================================
        class TradingSimulation {
            constructor() {
                this.bots = [];
                this.sectors = ['TECH', 'FINANCE', 'HEALTH', 'ENERGY', 'CONSUMER'];
                this.lastAchievedBot = null;
                this.transferHistory = [];
                this.running = false;
                this.tick = 0;
                this.totalFeesCollected = 0;
                this.intervalId = null;

                // 섹터별 가격 데이터
                this.sectorPrices = {
                    TECH: { price: 150, volatility: 0.03, trend: 0.0002 },
                    FINANCE: { price: 80, volatility: 0.015, trend: 0.0001 },
                    HEALTH: { price: 120, volatility: 0.02, trend: 0.00015 },
                    ENERGY: { price: 60, volatility: 0.025, trend: 0.0001 },
                    CONSUMER: { price: 100, volatility: 0.018, trend: 0.00012 }
                };

                this.init();
            }

            init() {
                this.initBots();
                this.updateUI();
                this.render();
                this.log('시스템 초기화 완료. 10개의 봇이 생성되었습니다.');
            }

            initBots() {
                this.bots = [];
                for (let i = 1; i <= 10; i++) {
                    const randomSector = this.sectors[Math.floor(Math.random() * this.sectors.length)];
                    this.bots.push(new Bot(i, randomSector));
                }
                this.totalFeesCollected = 0;
                this.tick = 0;
                this.lastAchievedBot = null;
                this.transferHistory = [];
            }

            getPriceForSector(sector) {
                return this.sectorPrices[sector]?.price || 100;
            }

            reset() {
                this.stop();
                this.initBots();
                document.getElementById('logContainer').innerHTML = '';
                this.updateUI();
                this.render();
                document.getElementById('lastTransfer').textContent = '없음';
                this.log('시뮬레이션이 리셋되었습니다.', 'warning');
            }

            start() {
                if (this.running) return;
                this.running = true;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;

                this.intervalId = setInterval(() => this.step(), 1000);
                this.log('▶ 시뮬레이션 시작!', 'success');
            }

            stop() {
                this.running = false;
                if (this.intervalId) {
                    clearInterval(this.intervalId);
                    this.intervalId = null;
                }
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
                this.log('⏸ 시뮬레이션 중지', 'warning');
            }

            updateSectorPrices() {
                for (let sector in this.sectorPrices) {
                    const data = this.sectorPrices[sector];
                    const change = (Math.random() - 0.5) * data.volatility + data.trend;
                    data.price *= (1 + change);
                    data.price = Math.max(data.price, 5); // 최소가격 $5
                }
            }

            step() {
                this.tick++;
                this.updateSectorPrices();

                // 각 봇 거래 로직
                this.bots.forEach(bot => {
                    if (!bot.isAlive) return;

                    const currentPrice = this.getPriceForSector(bot.sector);
                    const totalValue = bot.getTotalValue(currentPrice);

                    // 간단한 전략: 랜덤 매매
                    const action = Math.random();

                    if (action < 0.3 && bot.position > 0) {
                        // 매도
                        const sellQty = Math.ceil(bot.position * (0.3 + Math.random() * 0.4));
                        const result = bot.executeSell(sellQty, currentPrice);
                        if (result) {
                            this.totalFeesCollected += result.fees.total;
                            if (this.tick % 3 === 0) {
                                this.log(`Bot ${bot.id} 매도 ${result.quantity}주 @ $${currentPrice.toFixed(2)} (수
수료: $${result.fees.total.toFixed(3)})`);
                            }
                        }
                    } else if (action > 0.7 && bot.capital > currentPrice * 10) {
                        // 매수 (최소 $10 이상 남도록)
                        const maxInvest = bot.capital - 10;
                        const buyQty = Math.floor(maxInvest * (0.2 + Math.random() * 0.3) / currentPrice);
                        if (buyQty > 0) {
                            const result = bot.executeBuy(buyQty, currentPrice);
                            if (result) {
                                this.totalFeesCollected += result.fees.total;
                                if (this.tick % 3 === 0) {
                                    this.log(`Bot ${bot.id} 매수 ${result.quantity}주 @
$${currentPrice.toFixed(2)}`);
                                }
                            }
                        }
                    }

                    // 목표 달성 체크
                    if (bot.checkTargetAchievement(currentPrice)) {
                        this.lastAchievedBot = bot;
                        this.log(`🎯 Bot ${bot.id} 목표금액 달성! (${bot.sector} 섹터) 총자산:
$${totalValue.toFixed(2)}`, 'success');
                    }

                    // 청산 체크 (자본금 10% 이하)
                    if (totalValue < bot.initialCapital * 0.1) {
                        bot.isAlive = false;
                        bot.capital = 0;
                        bot.position = 0;
                        this.log(`💀 Bot ${bot.id} 청산되었습니다. (남은 자산: $${totalValue.toFixed(2)})`,
'error');
                    }
                });

                // 10틱마다 자동 섹터 전수
                if (this.tick % 10 === 0) {
                    this.autoTransfer();
                }

                this.updateUI();
                this.render();
            }

            findWorstBot() {
                const aliveBots = this.bots.filter(b => b.isAlive);
                if (aliveBots.length === 0) return null;

                return aliveBots.reduce((worst, current) => {
                    const worstValue = worst.getTotalValue(this.getPriceForSector(worst.sector));
                    const currentValue = current.getTotalValue(this.getPriceForSector(current.sector));
                    return currentValue < worstValue ? current : worst;
                });
            }

            autoTransfer() {
                if (!this.lastAchievedBot) return;

                const worstBot = this.findWorstBot();
                if (!worstBot || worstBot.id === this.lastAchievedBot.id) return;

                // 이미 같은 섹터면 전수 안함
                if (worstBot.sector === this.lastAchievedBot.sector) return;

                const oldSector = worstBot.sector;
                worstBot.sector = this.lastAchievedBot.sector;
                worstBot.sectorTransferCount++;

                const transfer = {
                    from: this.lastAchievedBot.id,
                    to: worstBot.id,
                    sector: worstBot.sector,
                    oldSector: oldSector,
                    time: new Date()
                };

                this.transferHistory.push(transfer);

                this.log(`🧬 섹터 전수: Bot ${worstBot.id} [${oldSector}] → [${worstBot.sector}] (Bot
${this.lastAchievedBot.id}로부터)`, 'genetic');
                this.updateTransferUI();
            }

            forceTransfer() {
                if (!this.lastAchievedBot) {
                    this.log('전수할 성공 봇이 없습니다. 먼저 목표금액 달성이 필요합니다.', 'warning');
                    return;
                }

                const worstBot = this.findWorstBot();
                if (!worstBot) {
                    this.log('전수 대상 봇이 없습니다.', 'warning');
                    return;
                }

                if (worstBot.id === this.lastAchievedBot.id) {
                    this.log('이미 최고의 섹터를 보유 중입니다.', 'warning');
                    return;
                }

                const oldSector = worstBot.sector;
                worstBot.sector = this.lastAchievedBot.sector;
                worstBot.sectorTransferCount++;

                this.log(`🧬 [강제] 섹터 전수: Bot ${worstBot.id} [${oldSector}] → [${worstBot.sector}]`,
'genetic');
                this.updateTransferUI();
                this.render();
            }

            updateTransferUI() {
                const lastTransfer = this.transferHistory[this.transferHistory.length - 1];
                if (lastTransfer) {
                    const timeStr = lastTransfer.time.toLocaleTimeString();
                    document.getElementById('lastTransfer').textContent =
                        `Bot ${lastTransfer.to} ← ${lastTransfer.sector} (${timeStr})`;
                }
            }

            updateUI() {
                const aliveCount = this.bots.filter(b => b.isAlive).length;
                const achievedCount = this.bots.filter(b => b.achievedTime !== null).length;

                document.getElementById('aliveCount').textContent = aliveCount;
                document.getElementById('achievedCount').textContent = achievedCount;
                document.getElementById('totalFees').textContent = `$${this.totalFeesCollected.toFixed(2)}`;
            }

            render() {
                const grid = document.getElementById('botGrid');
                grid.innerHTML = '';

                // 수익률 순으로 정렬 (죽은 봇은 뒤로)
                const sortedBots = [...this.bots].sort((a, b) => {
                    if (a.isAlive !== b.isAlive) return a.isAlive ? -1 : 1;
                    const valA = a.getTotalValue(this.getPriceForSector(a.sector));
                    const valB = b.getTotalValue(this.getPriceForSector(b.sector));
                    return valB - valA;
                });

                sortedBots.forEach((bot, index) => {
                    const currentPrice = this.getPriceForSector(bot.sector);
                    const totalValue = bot.getTotalValue(currentPrice);
                    const progress = Math.min((totalValue / bot.targetAmount) * 100, 100);
                    const isTargetAchieved = bot.achievedTime !== null;
                    const isTransferred = bot.sectorTransferCount > 0;

                    const card = document.createElement('div');
                    card.className = `bot-card ${isTargetAchieved ? 'target-achieved' : ''} ${isTransferred ?
'sector-transferred' : ''} ${!bot.isAlive ? 'dead' : ''}`;

                    const statusText = !bot.isAlive ? '💀 청산' :
                                     isTargetAchieved ? '✅ 목표달성' :
                                     isTransferred ? '🧬 섹터변경' : '⚡ 거래중';

                    card.innerHTML = `
                        <div class="bot-header">
                            <span class="bot-id">Bot #${bot.id} ${index < 3 && bot.isAlive ? '👑' : ''}</span>
                            <span class="sector-badge sector-${bot.sector}">${bot.sector}</span>
                        </div>
                        <div style="font-size: 0.9em; margin-bottom: 5px; opacity: 0.8;">${statusText}</div>
                        <div class="progress-bar">
                            <div class="progress-fill ${progress < 30 ? 'low' : ''}" style="width: ${progress}%">
                                ${progress.toFixed(0)}%
                            </div>
                        </div>
                        <div class="bot-info">
                            <div class="info-item">
                                <span class="info-label">현재 가치</span>
                                <span class="info-value">$${totalValue.toFixed(2)}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">목표금액</span>
                                <span class="info-value">$${bot.targetAmount}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">보유 주식</span>
                                <span class="info-value">${bot.position}주 @ $${currentPrice.toFixed(1)}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">현금</span>
                                <span class="info-value">$${bot.capital.toFixed(2)}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">누적 수수료</span>
                                <span class="info-value" style="color:
#ff6b6b">$${bot.totalFeesPaid.toFixed(2)}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">수익률</span>
                                <span class="info-value" style="color: ${bot.returnRate >= 0 ? '#00ff88' :
'#ff6b6b'}">
                                    ${(bot.returnRate * 100).toFixed(1)}%
                                </span>
                            </div>
                        </div>
                    `;

                    grid.appendChild(card);
                });
            }

            log(message, type = '') {
                const container = document.getElementById('logContainer');
                const entry = document.createElement('div');
                entry.className = `log-entry ${type}`;
                const time = new Date().toLocaleTimeString();
                entry.textContent = `[${time}] ${message}`;
                container.insertBefore(entry, container.firstChild);

                while (container.children.length > 100) {
                    container.removeChild(container.lastChild);
                }
            }
        }

        // 전역 인스턴스 생성
        let simulation;
        window.onload = function() {
            simulation = new TradingSimulation();
        };
    </script>
</body>
</html>
