<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AUTOBOT_10 — 섹터 골든크로스 자동매매</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--s1:#0e111a;--s2:#141824;--s3:#1b2035;
  --bd:#1e2540;--bd2:#28304e;
  --G:#00e5a0;--R:#ff3d5a;--A:#f5a623;--B:#4a9eff;--P:#a78bfa;--C:#00d4ff;
  --tx:#dde2f0;--t2:#6b7591;--t3:#2e3650;
  --mono:'JetBrains Mono',monospace;--sans:'Noto Sans KR',sans-serif;
}
html,body{min-height:100vh;background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:13px;line-height:1.5}

/* HEADER */
#hdr{position:sticky;top:0;z-index:200;background:rgba(7,9,15,.96);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--bd);padding:10px 20px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.logo{font-family:var(--mono);font-weight:600;font-size:15px;color:var(--G);letter-spacing:2px}
.logo em{color:var(--t2);font-style:normal;font-weight:400}
.badge{display:flex;align-items:center;gap:5px;background:rgba(0,229,160,.07);
  border:1px solid rgba(0,229,160,.18);border-radius:4px;padding:3px 9px;
  font-size:11px;font-family:var(--mono);color:var(--G)}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--G);animation:p 1.5s infinite}
@keyframes p{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.hright{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ctrl{display:flex;align-items:center;gap:6px;background:var(--s2);
  border:1px solid var(--bd);border-radius:6px;padding:5px 11px}
.ctrl label{font-size:11px;color:var(--t2);font-family:var(--mono)}
select{background:transparent;border:none;color:var(--tx);font-family:var(--mono);font-size:12px;outline:none;cursor:pointer}
.btn{background:var(--s2);border:1px solid var(--bd);color:var(--tx);font-family:var(--sans);
  font-size:12px;border-radius:6px;padding:6px 13px;cursor:pointer;
  display:flex;align-items:center;gap:5px;transition:.15s}
.btn:hover{background:var(--s3);border-color:var(--B)}
.btn.on{border-color:rgba(74,158,255,.5);color:var(--B);background:rgba(74,158,255,.08)}
.btn.rst{border-color:rgba(255,61,90,.25);color:var(--R)}
.btn.rst:hover{background:rgba(255,61,90,.08)}

/* SUMMARY */
#sum{display:grid;grid-template-columns:repeat(6,1fr);border-bottom:1px solid var(--bd)}
.sc{padding:12px 16px;border-right:1px solid var(--bd)}
.sc:last-child{border-right:none}
.sl{font-size:10px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.sv{font-family:var(--mono);font-size:17px;font-weight:600;line-height:1.2}
.ss{font-size:11px;color:var(--t2);margin-top:3px;font-family:var(--mono)}
.G{color:var(--G)}.R{color:var(--R)}.A{color:var(--A)}.B{color:var(--B)}.N{color:var(--tx)}

/* LAYOUT */
#wrap{display:grid;grid-template-columns:1fr 360px;min-height:calc(100vh - 126px)}

/* LEFT */
#left{padding:16px;border-right:1px solid var(--bd);overflow-y:auto}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.pt{font-family:var(--mono);font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:1px}
#grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}

/* BOT CARD */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;
  padding:13px;cursor:pointer;position:relative;overflow:hidden;transition:.15s}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--B))}
.card:hover{border-color:var(--cc,var(--B));background:var(--s2)}
.card.sel{border-color:var(--cc,var(--B));background:rgba(30,37,64,.5)}
.card.won{border-color:var(--G)}
.ctop{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;gap:4px;flex-wrap:wrap}
.cname{font-family:var(--mono);font-size:11px;font-weight:600}
.csec{font-size:10px;color:var(--t2);background:var(--s3);border:1px solid var(--bd);border-radius:3px;padding:1px 6px}
.ctag{font-size:10px;padding:2px 7px;border-radius:3px;font-family:var(--mono)}
.tG{background:rgba(0,229,160,.08);color:var(--G);border:1px solid rgba(0,229,160,.2)}
.tR{background:rgba(255,61,90,.07);color:var(--R);border:1px solid rgba(255,61,90,.18)}
.tW{background:rgba(107,117,145,.07);color:var(--t2);border:1px solid var(--bd)}
.tA{background:rgba(245,166,35,.08);color:var(--A);border:1px solid rgba(245,166,35,.25)}
.cprog{margin-bottom:9px}
.cprow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.cppct{font-family:var(--mono);font-size:12px;font-weight:600}
.pbar{height:3px;background:var(--s3);border-radius:2px;overflow:hidden}
.pfill{height:100%;border-radius:2px;transition:width .5s ease}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.ci{background:var(--s2);border-radius:5px;padding:5px 8px}
.cil{font-size:10px;color:var(--t3);font-family:var(--mono);margin-bottom:2px;text-transform:uppercase}
.civ{font-family:var(--mono);font-size:12px;font-weight:500}
/* MA indicator row */
.marow{display:flex;align-items:center;gap:6px;margin-top:8px;padding:5px 8px;
  background:var(--s2);border-radius:5px;border:1px solid var(--bd);flex-wrap:wrap}
.matxt{font-family:var(--mono);font-size:10px;color:var(--t2)}
.madot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* RIGHT */
#right{display:flex;flex-direction:column;overflow-y:auto;max-height:calc(100vh - 126px)}
.rsec{padding:14px;border-bottom:1px solid var(--bd)}
.rtit{font-family:var(--mono);font-size:10px;color:var(--t2);text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:12px;display:flex;align-items:center;gap:7px}

/* DETAIL */
#dbox{background:var(--s1);border-radius:8px;padding:12px}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.di{background:var(--s2);border-radius:5px;padding:7px 9px}
.dil{font-size:10px;color:var(--t3);font-family:var(--mono);text-transform:uppercase;margin-bottom:3px}
.div_{font-family:var(--mono);font-size:13px;font-weight:600}
.spark{width:100%;height:52px;margin-top:6px;border:1px solid var(--bd);border-radius:5px;background:var(--s2)}

/* MA chart detail */
.machrt{width:100%;height:72px;margin-top:6px;border:1px solid var(--bd);border-radius:5px;background:var(--s2)}

/* Cross signal history */
.xhist{margin-top:8px}
.xrow{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;
  background:var(--s2);border-radius:4px;margin-bottom:3px;font-family:var(--mono);font-size:11px}
.xrow.golden{border-left:2px solid var(--G)}
.xrow.dead{border-left:2px solid var(--R)}

/* CONFIG */
.cfgrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.cfgl{font-size:12px;color:var(--t2);font-family:var(--mono)}
.cfgi{width:110px;background:var(--s2);border:1px solid var(--bd);color:var(--tx);
  font-family:var(--mono);font-size:12px;border-radius:4px;padding:4px 8px;text-align:right}
.cfgi:focus{outline:none;border-color:var(--B)}
.tgl{width:34px;height:19px;background:var(--bd2);border-radius:10px;position:relative;cursor:pointer;transition:.2s}
.tgl.on{background:var(--G)}
.tgl::after{content:'';position:absolute;top:2px;left:2px;width:15px;height:15px;background:#fff;border-radius:50%;transition:.2s}
.tgl.on::after{left:17px}
.abtn{width:100%;background:var(--B);color:#fff;border:none;border-radius:6px;
  padding:8px;font-family:var(--sans);font-size:13px;cursor:pointer;transition:.15s;margin-top:6px}
.abtn:hover{opacity:.85}

/* TRADE LOG */
.trow{background:var(--s1);border:1px solid var(--bd);border-radius:6px;padding:9px 10px;
  margin-bottom:5px;font-family:var(--mono);font-size:11px}
.trow.buy{border-left:2px solid var(--G)}
.trow.win{border-left:2px solid var(--G)}
.trow.loss{border-left:2px solid var(--R)}
.trtop{display:flex;justify-content:space-between;margin-bottom:4px}
.tbadge{font-size:10px;padding:1px 6px;border-radius:2px}
.bBuy{background:rgba(0,229,160,.1);color:var(--G)}
.bSell{background:rgba(255,61,90,.1);color:var(--R)}
.trbot{display:flex;justify-content:space-between;color:var(--t2)}

/* MODAL */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:var(--s2);border:1px solid var(--bd2);border-radius:12px;padding:24px;width:400px;max-width:calc(100vw - 32px)}
.modal h3{font-family:var(--mono);font-size:14px;margin-bottom:16px}
.mf{margin-bottom:12px}
.mf label{display:block;font-size:11px;color:var(--t2);font-family:var(--mono);margin-bottom:5px}
.mf input,.mf select{width:100%;background:var(--s3);border:1px solid var(--bd);color:var(--tx);
  font-family:var(--mono);font-size:13px;border-radius:6px;padding:8px 12px}
.mf input:focus,.mf select:focus{outline:none;border-color:var(--B)}
.mbrow{display:flex;gap:8px;margin-top:16px}
.mb{flex:1;padding:9px;border-radius:6px;font-size:13px;cursor:pointer;font-family:var(--sans);border:none;transition:.15s}
.mb.c{background:var(--s3);color:var(--t2)}.mb.s{background:var(--B);color:#fff}
.mb:hover{opacity:.85}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:600;background:var(--s2);
  border:1px solid var(--bd2);border-radius:8px;padding:11px 16px;
  font-family:var(--mono);font-size:12px;box-shadow:0 8px 32px rgba(0,0,0,.5);
  animation:ti .25s ease;pointer-events:none}
@keyframes ti{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

@media(max-width:860px){#sum{grid-template-columns:repeat(3,1fr)}#wrap{grid-template-columns:1fr}#right{max-height:none}}
@media(max-width:500px){#grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="hdr">
  <div style="display:flex;align-items:center;gap:12px">
    <div class="logo">AUTOBOT<em>_10</em></div>
    <div class="badge"><div class="pulse"></div><span>LIVE</span></div>
    <span style="font-family:var(--mono);font-size:11px;color:var(--t3)" id="ts">--</span>
  </div>
  <div class="hright">
    <div class="ctrl"><label>인터벌</label>
      <select id="iv" onchange="setIv()">
        <option value="3">3초</option><option value="5">5초</option>
        <option value="10">10초</option><option value="30" selected>30초</option>
        <option value="60">1분</option><option value="300">5분</option>
      </select>
    </div>
    <div class="ctrl"><label>MA 단기</label>
      <select id="ma-fast">
        <option value="5" selected>5일</option><option value="10">10일</option><option value="20">20일</option>
      </select>
    </div>
    <div class="ctrl"><label>MA 장기</label>
      <select id="ma-slow">
        <option value="20" selected>20일</option><option value="50">50일</option><option value="60">60일</option>
      </select>
    </div>
    <button class="btn" id="tgbtn" onclick="openModal()">✈ 텔레그램</button>
    <button class="btn rst" onclick="doReset()">↺ 리셋</button>
  </div>
</div>

<div id="sum">
  <div class="sc"><div class="sl">총 투자금</div><div class="sv N" id="s0">₩10,000,000</div><div class="ss">10봇 × 백만원</div></div>
  <div class="sc"><div class="sl">현재 총자산</div><div class="sv" id="s1">₩0</div><div class="ss" id="s1s">+0.00%</div></div>
  <div class="sc"><div class="sl">누적 실현수익</div><div class="sv G" id="s2">₩0</div><div class="ss" id="s2s">익절 0회</div></div>
  <div class="sc"><div class="sl">누적 실현손실</div><div class="sv R" id="s3">₩0</div><div class="ss" id="s3s">손절 0회</div></div>
  <div class="sc"><div class="sl">현재 홀딩</div><div class="sv G" id="s4">0봇</div><div class="ss" id="s4s">골든 0 · 대기 0</div></div>
  <div class="sc"><div class="sl">목표 달성</div><div class="sv A" id="s5">0 / 10</div><div class="ss">천만원 도달</div></div>
</div>

<div id="wrap">
  <div id="left">
    <div class="ph">
      <div class="pt">섹터별 봇 현황 — 골든/데드크로스 전략</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--t3)" id="upd">대기중...</div>
    </div>
    <div id="grid"></div>
  </div>

  <div id="right">
    <div class="rsec">
      <div class="rtit">📊 <span id="dname">봇 상세 — 카드를 클릭하세요</span></div>
      <div id="dbox"><div style="color:var(--t3);font-family:var(--mono);font-size:12px;padding:8px 0">좌측 봇 카드를 클릭하면 상세 정보가 나타납니다.</div></div>
    </div>
    <div class="rsec">
      <div class="rtit">⚙ 전략 파라미터</div>
      <div class="cfgrow"><span class="cfgl">익절 비율 (%)</span><input class="cfgi" id="c-tp" type="number" value="8" min="1" max="50"></div>
      <div class="cfgrow"><span class="cfgl">손절 비율 (%)</span><input class="cfgi" id="c-sl" type="number" value="5" min="1" max="30"></div>
      <div class="cfgrow"><span class="cfgl">1회 매매비중 (%)</span><input class="cfgi" id="c-sz" type="number" value="30" min="5" max="100"></div>
      <div class="cfgrow"><span class="cfgl">목표금액 (만원)</span><input class="cfgi" id="c-goal" type="number" value="1000" min="200"></div>
      <div class="cfgrow"><span class="cfgl">텔레그램 알림</span>
        <div class="tgl on" id="tgtgl" onclick="this.classList.toggle('on')"></div>
      </div>
      <button class="abtn" onclick="applyConfig()">파라미터 적용</button>
    </div>
    <div class="rsec" style="flex:1">
      <div class="rtit">📋 매매 로그</div>
      <div id="tlog"></div>
    </div>

</div>

<!-- Telegram Modal -->
<div class="ovl" id="tgmod" style="display:none">
  <div class="modal">
    <h3>✈ 텔레그램 알림 설정</h3>
    <div class="mf"><label>BOT TOKEN</label><input id="m-tok" type="password" placeholder="123456789:AAH..."></div>
    <div class="mf"><label>CHAT ID</label><input id="m-cid" placeholder="-100xxxxxxxxxx 또는 개인 ID"></div>
    <div class="mf"><label>알림 조건</label>
      <select id="m-cnd">
        <option value="goal">목표 달성 시만 (천만원)</option>
        <option value="cross">골든/데드크로스 발생 시</option>
        <option value="sell">매도 체결 시마다</option>
        <option value="loss">손절 발생 시만</option>
        <option value="all">모든 매매 (매수+매도)</option>
      </select>
    </div>
    <div class="mbrow">
      <button class="mb c" onclick="closeModal()">취소</button>
      <button class="mb s" onclick="saveTg()">저장 & 테스트 전송</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  섹터 / 종목 구성 (10개, 중복 없음)
// ═══════════════════════════════════════════════
const SECTORS = [
  {id:0,sec:'반도체',    sym:'NVDA', pool:['NVDA','AMD','AVGO'],  color:'#a78bfa', bias:0.55},
  {id:1,sec:'빅테크',    sym:'AAPL', pool:['AAPL','MSFT','GOOGL'],color:'#4a9eff', bias:0.28},
  {id:2,sec:'전기차',    sym:'TSLA', pool:['TSLA','RIVN'],        color:'#00e5a0', bias:0.18},
  {id:3,sec:'이커머스',  sym:'AMZN', pool:['AMZN','SHOP'],        color:'#f5a623', bias:0.20},
  {id:4,sec:'소셜/광고', sym:'META', pool:['META','SNAP'],        color:'#ff7eb3', bias:0.30},
  {id:5,sec:'스트리밍',  sym:'NFLX', pool:['NFLX','ROKU'],        color:'#ff6b35', bias:0.22},
  {id:6,sec:'헬스케어',  sym:'LLY',  pool:['LLY','UNH','ABBV'],   color:'#00d4ff', bias:0.25},
  {id:7,sec:'금융',      sym:'JPM',  pool:['JPM','GS','MS'],      color:'#fbbf24', bias:0.12},
  {id:8,sec:'에너지',    sym:'XOM',  pool:['XOM','CVX'],          color:'#c084fc', bias:0.05},
  {id:9,sec:'암호화폐',  sym:'COIN', pool:['COIN','MSTR'],        color:'#e879f9', bias:0.45},
];

const INIT = 1_000_000;
// 2024년 섹터별 실제 연간 수익률 근사값 반영
const Y2024_RET  = [2.2, 0.32, -0.05, 0.22, 0.65, 0.35, 0.55, 0.25, 0.10, 1.10];
const Y2024_VOL  = [0.035,0.018,0.042,0.022,0.030,0.028,0.020,0.015,0.018,0.055];

// ═══════════════════════════════════════════════
//  가격 시뮬레이터 (2024 백테스트 기반)
// ═══════════════════════════════════════════════
class Candle {
  constructor(id) {
    this.ret  = Y2024_RET[id] / 252;   // 일간 기대수익률
    this.vol  = Y2024_VOL[id];
    this.price = 80 + Math.random()*120;
    this.closes = [];
    for(let i=0;i<100;i++) this._next(); // 워밍업
  }
  _next(){
    const p = this.closes.length ? this.closes[this.closes.length-1] : this.price;
    // GBM (기하 브라운 운동)
    const z = (Math.random()+Math.random()+Math.random()-1.5) * 1.155;
    const r = this.ret + this.vol * z;
    const np = Math.max(p * Math.exp(r), 1);
    this.closes.push(np);
    if(this.closes.length > 300) this.closes.shift();
    return np;
  }
  tick(){ return this._next() }
  get last(){ return this.closes[this.closes.length-1] }
}

// ═══════════════════════════════════════════════
//  이동평균 & 골든/데드크로스 계산
// ═══════════════════════════════════════════════
function sma(arr, n){
  if(arr.length < n) return null;
  const sl = arr.slice(-n);
  return sl.reduce((a,b)=>a+b,0)/n;
}

function crossSignal(closes, fast, slow){
  if(closes.length < slow+2) return {type:'none', maFast:null, maSlow:null};
  const maFast = sma(closes, fast);
  const maSlow = sma(closes, slow);
  const prevFast = sma(closes.slice(0,-1), fast);
  const prevSlow = sma(closes.slice(0,-1), slow);
  if(!maFast||!maSlow||!prevFast||!prevSlow) return {type:'none',maFast,maSlow};

  let type = 'none';
  if(prevFast <= prevSlow && maFast > maSlow) type = 'golden'; // 골든크로스
  if(prevFast >= prevSlow && maFast < maSlow) type = 'dead';   // 데드크로스
  return {type, maFast, maSlow, above: maFast > maSlow};
}

// ═══════════════════════════════════════════════
//  전역 상태
// ═══════════════════════════════════════════════
let CFG = {tp:8, sl:5, sz:30, goal:10_000_000};
let TG  = {token:'', chatId:'', cond:'goal', on:true};
let maFastN=5, maSlowN=20;
let selBot = null;
let tradeLog = [];
let tmr = null, ivMs = 30000;

let BOTS = makeBots();
function makeBots(){
  return SECTORS.map(s=>({
    ...s,
    capital:INIT, profit:0, loss:0,
    wins:0, losses:0, trades:0,
    equity:[INIT],
    pos:null,         // null | 'long'
    entry:0, posSize:0,
    crossHistory:[],  // 크로스 이벤트 기록
    lastCross:{type:'none', maFast:null, maSlow:null, above:false},
    history:[],
    status:'watch',   // watch | long | achieved
    candle: new Candle(s.id),
  }));
}

// ═══════════════════════════════════════════════
//  틱 엔진
// ═══════════════════════════════════════════════
function tick(){
  const fast = maFastN, slow = maSlowN;
  BOTS.forEach(b=>{
    if(b.status==='achieved') return;
    const price = b.candle.tick();
    const cs = crossSignal(b.candle.closes, fast, slow);
    const prev = b.lastCross;
    b.lastCross = cs;

    // ── 크로스 이벤트 기록
    if(cs.type==='golden' || cs.type==='dead'){
      b.crossHistory.unshift({
        type:cs.type, time:now(),
        price:price.toFixed(2), maFast:cs.maFast?.toFixed(2), maSlow:cs.maSlow?.toFixed(2)
      });
      if(b.crossHistory.length>20) b.crossHistory.pop();
      notifyTg(b, cs.type, price);
    }

    // ── 포지션 청산 (데드크로스 OR 익절/손절)
    if(b.pos==='long'){
      const pnlPct = (price - b.entry)/b.entry*100;
      const doExit = cs.type==='dead' || pnlPct >= CFG.tp || pnlPct <= -CFG.sl;
      if(doExit){
        const pnl = b.posSize * pnlPct/100;
        if(pnl>=0){b.profit+=pnl;b.wins++;}
        else{b.loss+=Math.abs(pnl);b.losses++;}
        b.capital += pnl;
        b.trades++;
        b.pos = null; b.entry=0; b.posSize=0;
        const t={side:'sell',pnl:Math.round(pnl),pct:pnlPct.toFixed(2),
          time:now(),price:price.toFixed(2),reason:cs.type==='dead'?'데드크로스':pnlPct>=CFG.tp?'익절':'손절',
          type:pnl>=0?'win':'loss', sec:b.sec, sym:b.sym};
        addLog(b,t);
        if(TG.on&&TG.token&&TG.chatId&&(TG.cond==='sell'||TG.cond==='all'||(TG.cond==='loss'&&t.type==='loss')))
          tgSend(`[${b.sec}] 매도 ${b.sym}\n사유: ${t.reason}\n손익: ${t.pnl>=0?'+':''}${W(t.pnl)} (${t.pct}%)\n시각: ${t.time}`);
      }
    }

    // ── 신규 진입 (골든크로스)
    if(b.pos===null && cs.type==='golden' && b.capital>50000){
      b.pos='long';
      b.entry=price;
      b.posSize=b.capital*(CFG.sz/100);
      const t={side:'buy',amount:Math.round(b.posSize),time:now(),price:price.toFixed(2),
        type:'buy', sec:b.sec, sym:b.sym};
      addLog(b,t);
      if(TG.on&&TG.token&&TG.chatId&&(TG.cond==='all'||TG.cond==='cross'))
        tgSend(`[${b.sec}] 🟢 골든크로스 매수 ${b.sym}\n금액: ${W(t.amount)}\n가격: $${t.price}`);
    }

    b.equity.push(b.capital);
    if(b.equity.length>60) b.equity.shift();

    if(b.capital >= CFG.goal && b.status!=='achieved'){
      b.status='achieved';
      goalAlert(b);
    }
  });

  render();
}

function addLog(b, t){
  b.history.unshift(t);
  if(b.history.length>80) b.history.pop();
  tradeLog.unshift({...t, sec:b.sec});
  if(tradeLog.length>60) tradeLog.pop();
}

function goalAlert(b){
  toast(`🎉 ${b.sec}봇 목표 달성! ${W(b.capital)}`,4000);
  if(TG.on&&TG.token&&TG.chatId)
    tgSend(`🎉 [AUTOBOT_10] ${b.sec} 섹터 목표 달성!\n💰 자산: ${W(b.capital)}\n📈 수익: ${W(b.profit)}\n📉 손실: ${W(b.loss)}\n🔄 매매: ${b.trades}회\n✅ 승률: ${(b.wins/b.trades*100).toFixed(1)}%`);
}

function notifyTg(b, crossType, price){
  if(!TG.on||!TG.token||!TG.chatId) return;
  if(TG.cond!=='cross'&&TG.cond!=='all') return;
  const ico = crossType==='golden'?'🟢':'🔴';
  tgSend(`${ico} [${b.sec}] ${crossType==='golden'?'골든':'데드'}크로스 ${b.sym} @ $${price.toFixed(2)}\nMA${maFastN}=${b.lastCross.maFast?.toFixed(2)} / MA${maSlowN}=${b.lastCross.maSlow?.toFixed(2)}`);
}

async function tgSend(msg){
  if(!TG.token||!TG.chatId) return;
  try{
    await fetch(`https://api.telegram.org/bot${TG.token}/sendMessage`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:TG.chatId,text:msg})
    });
  }catch(e){}
}

// ═══════════════════════════════════════════════
//  렌더링
// ═══════════════════════════════════════════════
const W = n=>'₩'+(Math.round(n)||0).toLocaleString('ko-KR');
const P = n=>(n>=0?'+':'')+Number(n).toFixed(2)+'%';
const now = ()=>new Date().toLocaleTimeString('ko-KR');
const qs = s=>document.querySelector(s);

function render(){
  renderSum();
  renderGrid();
  renderLog();
  if(selBot!==null) renderDetail(selBot);
  const t=new Date().toLocaleTimeString('ko-KR');
  qs('#ts').textContent=t;
  qs('#upd').textContent='갱신: '+t;
}

function renderSum(){
  const tv=BOTS.reduce((a,b)=>a+b.capital,0);
  const tp=BOTS.reduce((a,b)=>a+b.profit,0);
  const tl=BOTS.reduce((a,b)=>a+b.loss,0);
  const tw=BOTS.reduce((a,b)=>a+b.wins,0);
  const tlc=BOTS.reduce((a,b)=>a+b.losses,0);
  const ach=BOTS.filter(b=>b.status==='achieved').length;
  const hold=BOTS.filter(b=>b.pos==='long').length;
  const p=(tv-10000000)/10000000*100;
  qs('#s1').textContent=W(tv);qs('#s1').className='sv '+(p>=0?'G':'R');
  qs('#s1s').textContent=P(p);
  qs('#s2').textContent=W(tp);qs('#s2s').textContent=`익절 ${tw}회`;
  qs('#s3').textContent=W(tl);qs('#s3s').textContent=`손절 ${tlc}회`;
  qs('#s4').textContent=hold+'봇 홀딩';
  const golden=BOTS.filter(b=>b.lastCross.above).length;
  qs('#s4s').textContent=`골든존 ${golden} · 대기 ${10-hold-ach}`;
  qs('#s5').textContent=ach+' / 10';
}

function renderGrid(){
  qs('#grid').innerHTML=BOTS.map(b=>{
    const p=(b.capital-INIT)/INIT*100;
    const prog=Math.min(b.capital/CFG.goal*100,100);
    const cs=b.lastCross;
    const wr=b.trades>0?(b.wins/b.trades*100).toFixed(0):0;
    let tagC='tW',tagT='대기';
    if(b.status==='achieved'){tagC='tA';tagT='달성';}
    else if(b.pos==='long'){tagC='tG';tagT='홀딩';}
    else if(cs.above){tagC='tG';tagT='골든존';}
    else{tagC='tR';tagT='데드존';}
    const maInfo = cs.maFast
      ? `MA${maFastN}:${cs.maFast.toFixed(1)} MA${maSlowN}:${cs.maSlow.toFixed(1)}`
      : '워밍업중...';
    return `<div class="card${selBot===b.id?' sel':''}${b.status==='achieved'?' won':''}"
      style="--cc:${b.color}" id="bc${b.id}" onclick="selCard(${b.id})">
      <div class="ctop">
        <span class="cname" style="color:${b.color}">BOT_${String(b.id+1).padStart(2,'0')}</span>
        <span class="csec">${b.sec}</span>
        <span class="ctag ${tagC}">${tagT}</span>
      </div>
      <div class="cprog">
        <div class="cprow">
          <span style="font-family:var(--mono);font-size:11px;color:var(--t2)">${W(b.capital)}</span>
          <span class="cppct" style="color:${b.color}">${prog.toFixed(1)}%</span>
        </div>
        <div class="pbar"><div class="pfill" style="width:${prog}%;background:${b.color}"></div></div>
      </div>
      <div class="cgrid">
        <div class="ci"><div class="cil">수익률</div><div class="civ ${p>=0?'G':'R'}">${P(p)}</div></div>
        <div class="ci"><div class="cil">승률</div><div class="civ N">${wr}%</div></div>
        <div class="ci"><div class="cil">실현수익</div><div class="civ G">${W(b.profit)}</div></div>
        <div class="ci"><div class="cil">실현손실</div><div class="civ R">${W(b.loss)}</div></div>
      </div>
      <div class="marow">
        <div class="madot" style="background:${cs.above?'var(--G)':'var(--R)'}"></div>
        <span class="matxt">${maInfo} · ${cs.above?'골든존▲':'데드존▼'}</span>
      </div>
    </div>`;
  }).join('');
}

function renderDetail(id){
  const b=BOTS[id];
  if(!b) return;
  const p=(b.capital-INIT)/INIT*100;
  const wr=b.trades>0?(b.wins/b.trades*100).toFixed(1):0;
  const cs=b.lastCross;

  // Equity sparkline
  const eq=b.equity, mn=Math.min(...eq), mx=Math.max(...eq), rng=mx-mn||1;
  const epts=eq.map((v,i)=>`${(i/(eq.length-1||1)*256).toFixed(1)},${(46-((v-mn)/rng)*40).toFixed(1)}`).join(' ');
  const lc=b.capital>=INIT?'var(--G)':'var(--R)';

  // MA chart (price + two MAs)
  const cl=b.candle.closes, n=Math.min(60,cl.length);
  const slice=cl.slice(-n);
  const pmn=Math.min(...slice),pmx=Math.max(...slice),prng=pmx-pmn||1;
  const ppts=slice.map((v,i)=>`${(i/(n-1||1)*256).toFixed(1)},${(66-((v-pmn)/prng)*58).toFixed(1)}`).join(' ');
  const fastPts=[],slowPts=[];
  for(let i=0;i<n;i++){
    const sub=cl.slice(-(n-i)-1, cl.length-i||undefined).concat(slice.slice(0,i+1));
    const f=sma(slice.slice(0,i+1),Math.min(maFastN,i+1));
    const s=sma(slice.slice(0,i+1),Math.min(maSlowN,i+1));
    if(f) fastPts.push(`${(i/(n-1||1)*256).toFixed(1)},${(66-((f-pmn)/prng)*58).toFixed(1)}`);
    if(s) slowPts.push(`${(i/(n-1||1)*256).toFixed(1)},${(66-((s-pmn)/prng)*58).toFixed(1)}`);
  }

  qs('#dname').textContent=`BOT_${String(b.id+1).padStart(2,'0')} · ${b.sec} (${b.pool.join(' / ')})`;
  qs('#dbox').innerHTML=`
    <div class="dgrid">
      <div class="di"><div class="dil">현재 자산</div><div class="div_ ${b.capital>=INIT?'G':'R'}">${W(b.capital)}</div></div>
      <div class="di"><div class="dil">수익률</div><div class="div_ ${p>=0?'G':'R'}">${P(p)}</div></div>
      <div class="di"><div class="dil">누적 수익</div><div class="div_ G">${W(b.profit)}</div></div>
      <div class="di"><div class="dil">누적 손실</div><div class="div_ R">${W(b.loss)}</div></div>
      <div class="di"><div class="dil">매매횟수</div><div class="div_ N">${b.trades}회</div></div>
      <div class="di"><div class="dil">승률</div><div class="div_ N">${wr}%</div></div>
      <div class="di"><div class="dil">익절</div><div class="div_ G">${b.wins}회</div></div>
      <div class="di"><div class="dil">손절</div><div class="div_ R">${b.losses}회</div></div>
    </div>

    <div style="font-size:10px;font-family:var(--mono);color:var(--t3);margin-bottom:3px">📈 가격 + MA${maFastN}/MA${maSlowN}</div>
    <svg class="machrt" viewBox="0 0 258 68">
      <polyline points="${ppts}" fill="none" stroke="rgba(200,200,220,.3)" stroke-width="1"/>
      ${fastPts.length>1?`<polyline points="${fastPts.join(' ')}" fill="none" stroke="var(--G)" stroke-width="1.5"/>`:''}
      ${slowPts.length>1?`<polyline points="${slowPts.join(' ')}" fill="none" stroke="var(--R)" stroke-width="1.5"/>`:''}
      <text x="3" y="10" fill="var(--G)" style="font-size:8px;font-family:monospace">MA${maFastN}</text>
      <text x="30" y="10" fill="var(--R)" style="font-size:8px;font-family:monospace">MA${maSlowN}</text>
    </svg>

    <div style="font-size:10px;font-family:var(--mono);color:var(--t3);margin:7px 0 3px">💰 자산 추이</div>
    <svg class="spark" viewBox="0 0 258 50">
      <polyline points="${epts}" fill="none" stroke="${lc}" stroke-width="1.5"/>
      <polyline points="0,46 ${epts} 256,46" fill="${lc}" fill-opacity=".07" stroke="none"/>
    </svg>

    <div style="font-size:10px;font-family:var(--mono);color:var(--t3);margin:8px 0 5px">🔀 크로스 이벤트</div>
    <div class="xhist">
      ${b.crossHistory.slice(0,5).map(x=>`
        <div class="xrow ${x.type}">
          <span>${x.time} · ${x.type==='golden'?'🟢 골든':'🔴 데드'}크로스</span>
          <span style="color:var(--t2)">$${x.price}</span>
        </div>`).join('')||'<div style="color:var(--t3);font-size:11px;font-family:var(--mono)">크로스 없음</div>'}
    </div>

    <div style="font-size:10px;font-family:var(--mono);color:var(--t3);margin:8px 0 5px">📋 최근 매매</div>
    ${b.history.slice(0,5).map(t=>`
      <div class="trow ${t.side==='buy'?'buy':t.type}">
        <div class="trtop">
          <span>${t.time} · ${t.sym}</span>
          <span class="tbadge ${t.side==='buy'?'bBuy':'bSell'}">${t.side==='buy'?'매수':'매도'}</span>
        </div>
        ${t.side==='buy'
          ?`<div class="trbot"><span>진입가 $${t.price}</span><span>${W(t.amount)}</span></div>`
          :`<div class="trbot"><span>${t.reason}</span><span style="color:${t.pnl>=0?'var(--G)':'var(--R)'}">${t.pnl>=0?'+':''}${W(t.pnl)} (${t.pct}%)</span></div>`
        }
      </div>`).join('')||'<div style="color:var(--t3);font-size:11px;font-family:var(--mono)">매매 없음</div>'}
  `;
}

function renderLog(){
  const el=qs('#tlog');
  if(!tradeLog.length){el.innerHTML='<div style="color:var(--t3);font-family:var(--mono);font-size:12px">매매 없음</div>';return;}
  el.innerHTML=tradeLog.slice(0,25).map(t=>`
    <div class="trow ${t.side==='buy'?'buy':t.type}">
      <div class="trtop">
        <span>${t.sec} · ${t.sym}</span>
        <span class="tbadge ${t.side==='buy'?'bBuy':'bSell'}">${t.side==='buy'?'매수':'매도'}</span>
      </div>
      <div class="trbot">
        <span>${t.time}</span>
        <span>${t.side==='buy'?W(t.amount):`${t.pnl>=0?'+':''}${W(t.pnl)}`}</span>
      </div>
    </div>`).join('');
}

// ═══════════════════════════════════════════════
//  컨트롤
// ═══════════════════════════════════════════════
function selCard(id){
  selBot=id;
  renderGrid();
  renderDetail(id);
}
function applyConfig(){
  CFG.tp   = +qs('#c-tp').value||8;
  CFG.sl   = +qs('#c-sl').value||5;
  CFG.sz   = +qs('#c-sz').value||30;
  CFG.goal = (+qs('#c-goal').value||1000)*10000;
  toast('✅ 파라미터 적용됨');
}
function setIv(){
  ivMs=+qs('#iv').value*1000;
  clearInterval(tmr);
  tmr=setInterval(tick,ivMs);
  toast(`⏱ 인터벌: ${+qs('#iv').value}초`);
}
function doReset(){
  if(!confirm('모든 봇을 초기화할까요?')) return;
  maFastN=+qs('#ma-fast').value||5;
  maSlowN=+qs('#ma-slow').value||20;
  BOTS=makeBots();
  tradeLog=[];
  selBot=null;
  toast('↺ 초기화 완료');
  render();
}
function openModal(){qs('#tgmod').style.display='flex'}
function closeModal(){qs('#tgmod').style.display='none'}
async function saveTg(){
  TG.token  = qs('#m-tok').value.trim();
  TG.chatId = qs('#m-cid').value.trim();
  TG.cond   = qs('#m-cnd').value;
  TG.on     = qs('#tgtgl').classList.contains('on');
  closeModal();
  if(TG.token) qs('#tgbtn').classList.add('on');
  toast('✅ 텔레그램 저장됨');
  if(TG.token&&TG.chatId){
    await tgSend('[AUTOBOT_10] 연결 테스트 완료 ✅\n골든/데드크로스 섹터 자동매매 봇이 활성화되었습니다.');
    toast('📨 테스트 메시지 전송됨',2500);
  }
}

let _tt=null;
function toast(msg,d=2200){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const el=Object.assign(document.createElement('div'),{className:'toast',textContent:msg});
  document.body.appendChild(el);
  if(_tt)clearTimeout(_tt);
  _tt=setTimeout(()=>el.remove(),d);
}

// MA 파라미터 변경 감지
qs('#ma-fast').addEventListener('change',()=>{maFastN=+qs('#ma-fast').value;toast(`MA 단기: ${maFastN}일`)});
qs('#ma-slow').addEventListener('change',()=>{maSlowN=+qs('#ma-slow').value;toast(`MA 장기: ${maSlowN}일`)});

// ═══════════════════════════════════════════════
//  실행
// ═══════════════════════════════════════════════
render();
tick();
tmr = setInterval(tick, ivMs);
</script>
